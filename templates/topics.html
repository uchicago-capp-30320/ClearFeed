
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Top 5 Frequent User Topics</title>

  <!-- Option 1:  -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <style>
    .chart { width: 100%; height: 600px; }
  </style>
</head>
<body>

  <h1 style="text-align: center;" >Your Top 5 Most Frequent Topics.</h1>

  <div class="grid">

    <!-- ─── BAR CHART ─── -->
    <div class="chart-card">
      <div id="barChart" class="chart"></div>
    </div>

  </div>

  <script>
    // Data needs to have this schema when passed to the chart to get it to work
    //   context = {
    //     "order_labels": ["Jan","Feb","Mar","Apr","May","Jun"],
    //     "order_values": [120, 200, 150, 80, 210, 190],
    //   }
    //
    // Django's |safe filter renders Python lists as valid JS arrays.
    // ─────────────────────────────────────────────────────────────

    //UNDO THIS COMMENT FOR THE ACTUAL PIPELINE
    // const orderLabels = {{ order_labels|safe }};
    // const orderValues = {{ order_values|safe }};
    // test123

    const orderLabels = ["News", "Diaries", "Celebrity Gossip", "Sports", "Relationships"];
    const orderValues = [26, 24, 7, 7, 6];

    // ECHARTS Shared Theme Helper
    const COLORS = ['#f0c96b', '#5b8dee', '#e06c75', '#56b6c2', '#98c379'];

    const baseTextStyle = { color: '#8a8fa8', fontFamily: 'Georgia, serif' };

    const baseGrid = { left: '3%', right: '4%', bottom: '3%', containLabel: true };


    const barChart = echarts.init(document.getElementById('barChart'));
    barChart.setOption({
      textStyle: baseTextStyle,
      tooltip: { trigger: 'axis' },
      xAxis: {
        type: 'category',
        data: ['News', 'Diaries', 'Celebrity Gossip', 'Sports', 'Relationships'],
        name: "Topic Category",
        nameLocation: "middle",
        nameGap: 30,
        axisLine: { lineStyle: { color: '#2a2d3a' } },
        axisLabel: { color: '#8a8fa8' },
      },
      yAxis: {
        type: 'value',
        splitLine: { lineStyle: { color: '#2a2d3a' } },
        axisLabel: { color: '#8a8fa8' },
      },
      grid: baseGrid,
      series: [{
        name: 'Percent of Posts on Your Feed',
        type: 'bar',
        data: [26, 24, 7, 7, 6],
        itemStyle: {
          color: (params) => COLORS[params.dataIndex % COLORS.length],
          borderRadius: [4, 4, 0, 0],
        },
      }],
    });

    // Redraws all charts on window resize
    window.addEventListener('resize', () => {
      [barChart].forEach(c => c.resize());
    });

  </script>

</body>
</html>
